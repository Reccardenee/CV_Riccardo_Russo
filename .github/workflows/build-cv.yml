name: Build CV PDFs

on:
  push:
    branches: [main]
    tags: ['*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Italian CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume-it.tex
          latexmk_use_xelatex: true

      - name: Rename Italian PDF
        run: mv resume-it.pdf Riccardo_Russo_CV_IT.pdf

      - name: Compile English CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume-en.tex
          latexmk_use_xelatex: true

      - name: Rename English PDF
        run: mv resume-en.pdf Riccardo_Russo_CV_EN.pdf

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CV_PDFs
          path: |
            Riccardo_Russo_CV_IT.pdf
            Riccardo_Russo_CV_EN.pdf

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Riccardo Russo CV ${{ github.ref_name }}
          body: |
            CV generato automaticamente dalla pipeline CI/CD.
            - [Scarica versione italiana](Riccardo_Russo_CV_IT.pdf)
            - [Download English version](Riccardo_Russo_CV_EN.pdf)
          files: |
            Riccardo_Russo_CV_IT.pdf
            Riccardo_Russo_CV_EN.pdf
          make_latest: true
