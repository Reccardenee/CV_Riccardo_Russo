<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">

  <title>Riccardo Russo — CV</title>
  <meta name="description" content="Curriculum Vitae di Riccardo Russo — Software Engineer & AI Engineer">

  <meta property="og:title" content="Riccardo Russo — CV">
  <meta property="og:description" content="Software Engineer & AI Engineer">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://reccardenee.github.io/CV_Riccardo_Russo/">
  <meta property="og:image" content="https://reccardenee.github.io/CV_Riccardo_Russo/profile.png">

  <link rel="icon" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Riccardo Russo</h1>
      <div class="title">Software Engineer &middot; AI Engineer</div>
      <div class="social-links">
        <a href="https://github.com/Reccardenee" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/reccardenee" target="_blank" rel="noopener">LinkedIn</a>
        <a href="mailto:riccardo.russo1997@libero.it">Email</a>
      </div>
    </header>

    <div class="tabs" role="tablist">
      <button class="tab-btn active" role="tab" aria-selected="true" data-lang="it">Italiano</button>
      <button class="tab-btn" role="tab" aria-selected="false" data-lang="en">English</button>
    </div>

    <div class="viewer-wrapper">
      <iframe id="pdf-viewer" title="CV Preview" loading="lazy" allowfullscreen></iframe>
    </div>

    <div class="download-section">
      <a id="download-btn" class="download-btn" target="_blank" rel="noopener">Scarica PDF</a>
    </div>

    <footer>
      <p>Ultimo aggiornamento: <a href="https://github.com/Reccardenee/CV_Riccardo_Russo/releases/latest" target="_blank" rel="noopener">vedi ultima release</a></p>
    </footer>
  </div>

  <script>
    const PDF_URLS = {
      it: 'https://github.com/Reccardenee/CV_Riccardo_Russo/releases/latest/download/Riccardo_Russo_CV_IT.pdf',
      en: 'https://github.com/Reccardenee/CV_Riccardo_Russo/releases/latest/download/Riccardo_Russo_CV_EN.pdf'
    };

    const LABELS = {
      it: { download: '\u2193 Scarica PDF', open: '\u2193 Apri PDF' },
      en: { download: '\u2193 Download PDF', open: '\u2193 Open PDF' }
    };

    const viewer = document.getElementById('pdf-viewer');
    const downloadBtn = document.getElementById('download-btn');
    const tabs = document.querySelectorAll('.tab-btn');
    const viewerWrapper = document.querySelector('.viewer-wrapper');

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    function updateViewer(lang) {
      const pdfUrl = PDF_URLS[lang];
      localStorage.setItem('lang', lang);

      downloadBtn.href = pdfUrl;

      if (isMobile) {
        viewerWrapper.style.display = 'none';
        downloadBtn.textContent = LABELS[lang].open;
      } else {
        viewerWrapper.style.display = 'block';
        viewer.src = 'https://docs.google.com/viewer?url=' + encodeURIComponent(pdfUrl) + '&embedded=true';
        downloadBtn.textContent = LABELS[lang].download;
      }

      tabs.forEach(btn => {
        const active = btn.dataset.lang === lang;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-selected', active);
      });
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => updateViewer(btn.dataset.lang));
    });

    const savedLang = localStorage.getItem('lang') || 'it';
    updateViewer(savedLang);
  </script>
</body>
</html>
